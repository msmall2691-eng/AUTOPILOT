version: "3.8"

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: autopilot_secret
      POSTGRES_DB: autopilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Autopilot App ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://autopilot:autopilot_secret@db:5432/autopilot?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-random-64-char-secret-in-production}"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy

  # ---- Prisma Studio (optional, for DB admin) ----
  studio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: "postgresql://autopilot:autopilot_secret@db:5432/autopilot?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "prisma", "studio", "--port", "5555", "--hostname", "0.0.0.0"]
    profiles:
      - tools

volumes:
  postgres_data:
